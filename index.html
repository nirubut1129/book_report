<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>読書感想文 かんたんサポート</title>
<link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --sky: #e0f4ff;
  --blue: #4a90d9;
  --blue-dark: #2c6fad;
  --yellow: #ffd84d;
  --orange: #ff8c42;
  --green: #5cba7d;
  --green-light: #e6f7ec;
  --pink: #ff6b9d;
  --purple: #9b59b6;
  --text: #2d3a4a;
  --text-light: #6b7c93;
  --bg: #f0f9ff;
  --radius: 20px;
  --shadow: 0 4px 24px rgba(74,144,217,0.13);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 0 0 60px;
}

/* ===== HEADER ===== */
header {
  background: url('images/IMG_7110.png') center / 220% auto no-repeat;
  padding: 20px 20px 38px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
header::before {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(74, 144, 217, 0.55);
}
.header-mascot {
  position: relative;
  display: inline-block;
  margin-bottom: 6px;
  animation: headerFloat 3s ease-in-out infinite;
}
@keyframes headerFloat {
  0%,100% { transform: translateY(0) rotate(-2deg); }
  50% { transform: translateY(-10px) rotate(2deg); }
}
.header-mascot img { filter: drop-shadow(0 4px 12px rgba(0,0,0,0.25)); width: 88%; max-width: 340px; height: auto; object-fit: contain; display: block; margin: 0 auto; }
.char-mini { object-fit: cover; object-position: center; border-radius: 50%; }
.char-large { width: 140px; height: 140px; object-fit: cover; object-position: center; border-radius: 50%; }
.header-sparkle {
  position: absolute;
  top: -4px; right: -8px;
  font-size: 1.2rem;
  animation: sparkSpin 2s linear infinite;
}
@keyframes sparkSpin {
  0% { transform: rotate(0) scale(1); }
  50% { transform: rotate(180deg) scale(1.4); }
  100% { transform: rotate(360deg) scale(1); }
}
header h1 {
  font-family: 'Mochiy Pop One', sans-serif;
  font-size: 1.65rem;
  color: white;
  position: relative;
  text-shadow: 0 2px 8px rgba(0,0,0,0.15);
  line-height: 1.4;
}
header p {
  color: rgba(255,255,255,0.92);
  margin-top: 6px;
  font-size: 0.85rem;
  position: relative;
}

/* ===== PROGRESS ===== */
.progress-wrap {
  max-width: 600px;
  margin: -16px auto 0;
  padding: 0 20px;
  position: relative;
  z-index: 10;
}
.progress-bar-bg {
  background: white;
  border-radius: 50px;
  height: 12px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.1);
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--yellow), var(--orange));
  border-radius: 50px;
  transition: width 0.5s cubic-bezier(.4,0,.2,1);
}
.progress-labels {
  display: flex;
  justify-content: space-between;
  margin-top: 8px;
  font-size: 0.67rem;
  color: var(--text-light);
  font-weight: 500;
}
.steps-row {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin: 16px 20px 0;
  max-width: 600px;
  margin-left: auto;
  margin-right: auto;
}
.step-dot {
  width: 34px; height: 34px;
  border-radius: 50%;
  background: white;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  border: 3px solid #e0eaf5;
  transition: all 0.3s;
  flex-shrink: 0;
}
.step-dot.active { border-color: var(--yellow); background: var(--yellow); box-shadow: 0 0 0 4px rgba(255,216,77,0.3); transform: scale(1.15); }
.step-dot.done { border-color: var(--green); background: var(--green); color: white; font-size: 0.85rem; }

/* ===== CARD ===== */
.main { max-width: 600px; margin: 22px auto 0; padding: 0 16px; }
.card {
  background: white;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 22px 20px 24px;
  animation: slideUp 0.4s cubic-bezier(.4,0,.2,1);
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ===== MASCOT + BUBBLE ===== */
.char-row {
  display: flex;
  align-items: flex-end;
  gap: 12px;
  margin-bottom: 18px;
}
.char-mini {
  width: 68px;
  height: 68px;
  flex-shrink: 0;
  filter: drop-shadow(0 3px 8px rgba(0,0,0,0.15));
  animation: miniFloat 2.5s ease-in-out infinite;
}
@keyframes miniFloat {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-5px); }
}
.bubble {
  background: white;
  border: 2.5px solid var(--blue);
  border-radius: 16px 16px 16px 4px;
  padding: 10px 13px;
  flex: 1;
  font-size: 0.875rem;
  line-height: 1.65;
  color: var(--text);
  box-shadow: 0 2px 10px rgba(74,144,217,0.1);
}
.bubble-voice {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  background: var(--sky);
  border: none;
  border-radius: 20px;
  padding: 3px 9px;
  font-size: 0.72rem;
  color: var(--blue-dark);
  cursor: pointer;
  margin-top: 6px;
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 700;
  transition: all 0.2s;
}
.bubble-voice:hover { background: var(--blue); color: white; }
.bubble-voice.speaking { background: var(--orange); color: white; animation: pulse 0.4s ease infinite alternate; }
@keyframes pulse { to { opacity: 0.7; } }

.step-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: var(--sky);
  color: var(--blue-dark);
  font-size: 0.72rem;
  font-weight: 700;
  padding: 4px 12px;
  border-radius: 50px;
  margin-bottom: 14px;
}
.card h2 {
  font-family: 'Mochiy Pop One', sans-serif;
  font-size: 1.15rem;
  color: var(--text);
  margin-bottom: 18px;
  line-height: 1.5;
}

/* ===== SIMPLE FIELDS ===== */
.simple-field { margin-bottom: 18px; }
.field-label {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 0.82rem;
  font-weight: 700;
  color: var(--text-light);
  margin-bottom: 7px;
}
.field-voice {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 1.05rem;
  color: var(--blue);
  padding: 0;
  transition: transform 0.2s;
  margin-left: auto;
}
.field-voice:hover { transform: scale(1.2); }
.field-voice.speaking { animation: wiggle 0.3s ease infinite alternate; }
@keyframes wiggle { to { transform: scale(1.25) rotate(15deg); } }
.simple-field input[type="text"],
.simple-field select {
  width: 100%;
  padding: 13px 15px;
  border: 2px solid #dce8f5;
  border-radius: 13px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.95rem;
  color: var(--text);
  background: #f8fbff;
  transition: border-color 0.2s, box-shadow 0.2s;
  outline: none;
}
.simple-field input:focus, .simple-field select:focus {
  border-color: var(--blue);
  box-shadow: 0 0 0 4px rgba(74,144,217,0.12);
  background: white;
}
.simple-field select { cursor: pointer; }

/* ===== CHOICE GROUPS ===== */
.choice-group {
  background: #f8fbff;
  border: 1.5px solid #e4eef8;
  border-radius: 14px;
  padding: 14px;
  margin-bottom: 14px;
}
.choice-group:last-of-type { margin-bottom: 0; }
.q-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
}
.q-num {
  background: var(--blue);
  color: white;
  width: 22px; height: 22px;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 0.7rem;
  font-weight: 700;
  flex-shrink: 0;
}
.q-text {
  flex: 1;
  font-size: 0.875rem;
  font-weight: 700;
  color: #4a6a8a;
  line-height: 1.4;
}
.q-voice {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 1.05rem;
  color: var(--blue);
  padding: 0;
  flex-shrink: 0;
  transition: transform 0.2s;
}
.q-voice:hover { transform: scale(1.2); }
.q-voice.speaking { animation: wiggle 0.3s ease infinite alternate; }

.options-list {
  display: flex;
  flex-direction: column;
  gap: 7px;
}
.opt {
  display: flex;
  align-items: center;
  gap: 10px;
  background: white;
  border: 2px solid #dce8f5;
  border-radius: 12px;
  padding: 10px 12px;
  cursor: pointer;
  transition: all 0.15s;
  font-size: 0.875rem;
  user-select: none;
}
.opt:hover { border-color: var(--blue); background: #eef6ff; }
.opt.selected { border-color: var(--blue); background: var(--sky); }
.opt-radio {
  width: 18px; height: 18px;
  border-radius: 50%;
  border: 2.5px solid #c0d8f0;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all 0.15s;
}
.opt.selected .opt-radio { border-color: var(--blue); background: var(--blue); }
.opt-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: white;
  display: none;
}
.opt.selected .opt-dot { display: block; }
.opt-emoji { font-size: 1.1rem; flex-shrink: 0; }
.opt-label { flex: 1; }

.other-input {
  margin-top: 8px;
  padding: 10px 13px;
  width: 100%;
  border: 2px solid var(--blue);
  border-radius: 10px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.875rem;
  outline: none;
  background: white;
  color: var(--text);
  display: none;
}
.other-input.show { display: block; }
.other-input:focus { box-shadow: 0 0 0 3px rgba(74,144,217,0.15); }

/* ===== BUTTONS ===== */
.btn-row { display: flex; gap: 10px; margin-top: 22px; }
.btn {
  flex: 1;
  padding: 14px;
  border: none;
  border-radius: 14px;
  font-family: 'Mochiy Pop One', sans-serif;
  font-size: 0.95rem;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-back { background: #f0f4f8; color: var(--text-light); flex: 0 0 auto; padding: 14px 18px; }
.btn-back:hover { background: #e0e8f0; }
.btn-next { background: linear-gradient(135deg, var(--blue), #36b3f0); color: white; box-shadow: 0 4px 16px rgba(74,144,217,0.35); }
.btn-next:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(74,144,217,0.45); }
.btn-next:active { transform: translateY(0); }
.btn-next:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

/* ===== LOADING ===== */
.loading-wrap { text-align: center; padding: 40px 20px; }
.spinner { width: 56px; height: 56px; border: 5px solid #e0eaf5; border-top-color: var(--blue); border-radius: 50%; animation: spin 0.9s linear infinite; margin: 0 auto 20px; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-wrap p { font-family: 'Mochiy Pop One', sans-serif; color: var(--blue); font-size: 1rem; }
.loading-dots::after { content: ''; animation: dots 1.5s steps(4, end) infinite; }
@keyframes dots { 0% { content: ''; } 25% { content: '・'; } 50% { content: '・・'; } 75% { content: '・・・'; } }

/* ===== RESULT ===== */
.result-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.result-emoji { font-size: 2.5rem; animation: bounce 0.6s ease; }
@keyframes bounce { 0%,100% { transform: scale(1); } 50% { transform: scale(1.3); } }
.result-title { font-family: 'Mochiy Pop One', sans-serif; font-size: 1.3rem; }
.section-block { background: #f8fbff; border-radius: 14px; padding: 16px 18px; margin-bottom: 12px; border-left: 4px solid var(--blue); animation: slideUp 0.4s ease both; }
.section-block:nth-child(2) { border-left-color: var(--green); animation-delay: 0.1s; }
.section-block:nth-child(3) { border-left-color: var(--orange); animation-delay: 0.2s; }
.section-block:nth-child(4) { border-left-color: var(--pink); animation-delay: 0.3s; }
.section-label { font-family: 'Mochiy Pop One', sans-serif; font-size: 0.78rem; color: var(--text-light); margin-bottom: 7px; display: flex; align-items: center; gap: 5px; justify-content: space-between; }
.section-voice { background: none; border: none; cursor: pointer; font-size: 0.9rem; padding: 2px 5px; border-radius: 6px; opacity: 0.55; transition: opacity 0.2s; }
.section-voice:hover, .section-voice.speaking { opacity: 1; }
.btn-read-all { width: 100%; margin-top: 8px; padding: 12px; background: linear-gradient(135deg, #e0f4ff, #cce8ff); color: var(--blue-dark); border: 2px solid var(--blue); border-radius: 14px; font-family: 'Mochiy Pop One', sans-serif; font-size: 0.92rem; cursor: pointer; transition: all 0.2s; }
.btn-read-all:hover { background: linear-gradient(135deg, #cce8ff, #b3d9ff); }
.section-content { font-size: 0.93rem; line-height: 1.85; color: var(--text); white-space: pre-wrap; }
.btn-copy { width: 100%; margin-top: 10px; padding: 14px; background: linear-gradient(135deg, var(--green), #3da862); color: white; border: none; border-radius: 14px; font-family: 'Mochiy Pop One', sans-serif; font-size: 1rem; cursor: pointer; box-shadow: 0 4px 16px rgba(92,186,125,0.35); transition: all 0.2s; }
.btn-copy:hover { transform: translateY(-2px); }
.btn-restart { width: 100%; margin-top: 10px; padding: 12px; background: #f0f4f8; color: var(--text-light); border: none; border-radius: 14px; font-family: 'Mochiy Pop One', sans-serif; font-size: 0.9rem; cursor: pointer; }
.btn-restart:hover { background: #e0e8f0; }
.error-box { background: #fff0f0; border: 2px solid #ffcccc; border-radius: 14px; padding: 16px; color: #cc4444; font-size: 0.9rem; margin-top: 16px; line-height: 1.6; }

/* ===== TOAST ===== */
/* ===== API KEY ===== */
.api-key-section {
  margin-top: 18px;
  border: 2px dashed #dce8f5;
  border-radius: 14px;
  padding: 12px 14px;
}
.api-key-toggle {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.82rem;
  font-weight: 700;
  color: var(--text-light);
  cursor: pointer;
  user-select: none;
}
.api-key-toggle:hover { color: var(--blue); }
.api-key-body {
  margin-top: 10px;
  display: flex;
  gap: 8px;
}
.api-key-body input {
  flex: 1;
  padding: 9px 12px;
  border: 2px solid #dce8f5;
  border-radius: 10px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.82rem;
  outline: none;
  background: #f8fbff;
  color: var(--text);
}
.api-key-body input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(74,144,217,0.1); }
.api-key-save-btn {
  padding: 9px 14px;
  background: var(--blue);
  color: white;
  border: none;
  border-radius: 10px;
  font-family: 'Mochiy Pop One', sans-serif;
  font-size: 0.78rem;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.api-key-save-btn:hover { background: var(--blue-dark); }
.api-key-status { font-size: 0.75rem; margin-top: 6px; font-weight: 700; color: var(--green); }
.api-key-status.not-set { color: var(--orange); }

.toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--text); color: white; padding: 12px 24px; border-radius: 50px; font-size: 0.9rem; font-weight: 500; transition: transform 0.3s; z-index: 100; white-space: nowrap; }
.toast.show { transform: translateX(-50%) translateY(0); }

/* ===== VOICE OPTION HIGHLIGHT ===== */
.opt.voice-highlight { background: linear-gradient(135deg, #fff9c4 0%, #fff3e6 100%); border: 2px solid var(--orange); transform: scale(1.02); box-shadow: 0 2px 12px rgba(255,140,66,0.25); }

/* ===== TITLE VOICE BUTTON ===== */
.title-voice { background: none; border: none; cursor: pointer; font-size: 1rem; padding: 2px 6px; border-radius: 8px; opacity: 0.6; transition: opacity 0.2s; vertical-align: middle; margin-left: 6px; }
.title-voice:hover { opacity: 1; }
.title-voice.speaking { opacity: 1; animation: pulse 0.8s infinite; }

/* ===== CHAR COUNT DISPLAY ===== */
.char-count-display { background: var(--green-light); border: 2px solid var(--green); border-radius: var(--radius); padding: 14px 16px; margin: 14px 0 10px; text-align: center; }
.char-count-nums { font-weight: 700; margin-bottom: 8px; }
.char-count-current { color: var(--blue-dark); font-size: 1.5rem; font-family: 'Mochiy Pop One', sans-serif; }
.char-count-sep { color: var(--text-light); font-size: 1.1rem; margin: 0 4px; }
.char-count-target { color: var(--text-light); font-size: 0.95rem; }
.char-count-bar-wrap { background: #d4edda; border-radius: 10px; height: 12px; margin: 8px 0; overflow: hidden; }
.char-count-bar-fill { height: 100%; background: linear-gradient(90deg, var(--green), #3da862); border-radius: 10px; transition: width 0.6s ease; }
.char-count-hint { font-size: 0.88rem; color: var(--text); margin-top: 8px; line-height: 1.5; }
</style>
</head>
<body>

<header>
  <div class="header-mascot">
    <img id="headerOwl" src="images/IMG_7110.png" alt="ホクリ" onerror="this.style.visibility='hidden'">
    <span class="header-sparkle">✨</span>
  </div>
  <h1>📚 読書感想文<br>かんたんサポート</h1>
  <p id="headerSub">しつもんにこたえるだけで かんそう文の下書きができるよ！</p>
</header>

<div class="progress-wrap">
  <div class="progress-bar-bg">
    <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
  </div>
  <div class="progress-labels">
    <span>スタート</span>
    <span>本の情報</span>
    <span>お話</span>
    <span>場面</span>
    <span>これから</span>
    <span>理由</span>
    <span>完成！</span>
  </div>
</div>

<div class="steps-row" id="stepsRow"></div>
<div class="main"><div class="card" id="mainCard"></div></div>
<div class="toast" id="toast">📋 コピーしました！</div>

<script>
/* ===== CHARACTER IMAGES ===== */
function getCharImg(type, large) {
  const src = { start:'images/IMG_7110.png', mid:'images/IMG_7111.png', end:'images/IMG_7112.png' }[type] || 'images/IMG_7111.png';
  const cls = large ? 'char-large' : 'char-mini';
  return `<img class="${cls}" src="${src}" alt="ホクリ" onerror="this.style.visibility='hidden'">`;
}

/* ===== DEMO MODE ===== */
const DEMO_MODE_KEY = 'hokuri_demo_mode';
function isDemoMode() { return localStorage.getItem(DEMO_MODE_KEY) === '1'; }
function toggleDemoMode() {
  if (isDemoMode()) { localStorage.removeItem(DEMO_MODE_KEY); } else { localStorage.setItem(DEMO_MODE_KEY, '1'); }
  renderStep();
}
function buildDemoResult() {
  const cat = gradeCat();
  const low = cat === 'low';
  const high = cat === 'high';
  const title = answers.title || 'この本';

  // ヘルパー：結末ラベルを自然な文末表現に変換
  function normalizeEnding(label) {
    if (!label) return low ? 'おわりました' : '終わりました';
    if (label.includes('ハッピー') || label.includes('よかった'))
      return low ? 'さいごはみんながしあわせになる、よいおわりでした' : '最後はみんなが幸せになる、よい終わり方でした';
    if (label.includes('かなし') || label.includes('悲し') || label.includes('悲劇'))
      return low ? 'かなしいおわりでした' : '悲しい終わり方でした';
    if (label.includes('どちら') || label.includes('余韻') || label.includes('よく分からない') || label.includes('わからない'))
      return low ? 'どんなふうにおわるかよくわからない、ふしぎなおわりかたでした' : '考えさせられるような終わり方でした';
    return low ? 'まだよみとちゅうです' : 'まだ読み途中です';
  }

  // ヘルパー：気持ちラベルを「〜な気持ちに」の形に変換
  function normalizeFeeling(label) {
    if (!label) return low ? 'いろいろなきもちに' : 'いろいろな気持ちに';
    if (label.includes('かなし') || label.includes('悲し'))
      return low ? 'かなしくてなきそうな気もちに' : '悲しくて泣きそうな気持ちに';
    if (label.includes('うれし') || label.includes('温か') || label.includes('あたたか'))
      return low ? 'うれしくてあたたかい気もちに' : 'うれしくて温かい気持ちに';
    if (label.includes('びっくり') || label.includes('ドキドキ'))
      return low ? 'びっくりしてドキドキした気もちに' : 'びっくりしてドキドキした気持ちに';
    if (label.includes('笑') || label.includes('わら'))
      return low ? 'おもわずわらってしまいそうな気もちに' : '思わず笑ってしまうような気持ちに';
    if (label.includes('くやし') || label.includes('もどか') || label.includes('もやもや'))
      return low ? 'もやもやしてくやしい気もちに' : 'くやしくてもどかしい気持ちに';
    return low ? 'いろいろなきもちに' : 'いろいろな気持ちに';
  }

  // ヘルパー：「これから」ラベルを自然な文に変換
  function normalizeFuture(label) {
    if (!label || label.includes('特になし') || label.includes('とくになし') || label.includes('特に変化'))
      return low ? 'いろいろなことをかんがえることができました' : 'さまざまなことを考えることができました';
    if (label.includes('変わった') || label.includes('変化'))
      return low ? 'ものの見かたがかわりました' : '物の見方・考え方が変わりました';
    if (label.includes('やさしく') || label.includes('優しく') || label.includes('思いやり'))
      return low ? 'ともだちやかぞくにやさしくしたいとおもいました' : '友だちや家族にもっと優しくしたいと思いました';
    if (label.includes('挑戦') || label.includes('ちょうせん'))
      return low ? 'なにかにちょうせんしてみたいとおもいました' : '何かに挑戦してみたいと思いました';
    if (label.includes('感謝') || label.includes('かんしゃ'))
      return low ? 'まわりの人にかんしゃをつたえたいとおもいました' : '感謝を伝えることを大切にしたいと思いました';
    return low ? 'いろいろなことをかんがえることができました' : 'さまざまなことを考えることができました';
  }

  // 選んだ理由 → block1
  const reasonLabel = (answers.reason && answers.reason.label) || '';
  let block1 = '';
  if (low) {
    if (reasonLabel.includes('表紙')) block1 = `ぼくが「${title}」をえらんだのは、ひょうしのえにひきつけられたからです。`;
    else if (reasonLabel.includes('タイトル')) block1 = `ぼくが「${title}」をえらんだのは、タイトルがおもしろそうだったからです。`;
    else if (reasonLabel.includes('すすめ')) block1 = `ぼくが「${title}」をえらんだのは、先生やともだちにすすめてもらったからです。`;
    else if (reasonLabel.includes('じゅぎょう') || reasonLabel.includes('授業')) block1 = `ぼくが「${title}」をえらんだのは、じゅぎょうで出てきたからです。`;
    else if (reasonLabel.includes('気になって') || reasonLabel.includes('きになって')) block1 = `ぼくが「${title}」をえらんだのは、ずっとよみたいとおもっていたからです。`;
    else block1 = `ぼくが「${title}」をえらんだのは、きょうみをもったからです。`;
  } else if (high) {
    if (reasonLabel.includes('表紙') || reasonLabel.includes('デザイン')) block1 = `わたしが「${title}」を選んだのは、表紙のデザインに引き付けられたからです。`;
    else if (reasonLabel.includes('タイトル')) block1 = `わたしが「${title}」を選んだのは、タイトルに強く興味を持ったからです。`;
    else if (reasonLabel.includes('すすめ')) block1 = `わたしが「${title}」を選んだのは、先生や友人にすすめてもらったことがきっかけです。`;
    else if (reasonLabel.includes('授業')) block1 = `わたしが「${title}」を選んだのは、授業で紹介されたことがきっかけです。`;
    else if (reasonLabel.includes('気になって') || reasonLabel.includes('以前から')) block1 = `わたしが「${title}」を選んだのは、以前からずっと読みたいと思っていたからです。`;
    else block1 = `わたしが「${title}」を選んだのは、内容に興味を持ったからです。`;
  } else {
    if (reasonLabel.includes('表紙')) block1 = `わたしが「${title}」を選んだのは、表紙のデザインに引きつけられたからです。`;
    else if (reasonLabel.includes('タイトル')) block1 = `わたしが「${title}」を選んだのは、タイトルが面白そうだったからです。`;
    else if (reasonLabel.includes('すすめ')) block1 = `わたしが「${title}」を選んだのは、先生や友だちにすすめてもらったからです。`;
    else if (reasonLabel.includes('授業')) block1 = `わたしが「${title}」を選んだのは、授業で紹介されたことがきっかけです。`;
    else if (reasonLabel.includes('気になって')) block1 = `わたしが「${title}」を選んだのは、前からずっと読んでみたかったからです。`;
    else block1 = `わたしが「${title}」を選んだのは、内容に興味を持ったからです。`;
  }

  // block1に読んでみた感想を追加（readImpressionの選択から）
  const readImpressionLabel = (answers.readImpression && answers.readImpression.label) || '';
  if (low) {
    if (readImpressionLabel.includes('はまって')) block1 += `よみはじめたら、すぐにお話のせかいにひきこまれて、どんどんよみつづけてしまいました。`;
    else if (readImpressionLabel.includes('ゆっくり')) block1 += `ゆっくりとたのしみながらよむことができました。`;
    else if (readImpressionLabel.includes('むずかしい')) block1 += `むずかしいところもありましたが、さいごまでよみきることができました。`;
    else if (readImpressionLabel.includes('きたい') || readImpressionLabel.includes('もっとよかった')) block1 += `きたいしていたよりもっとおもしろくて、よんでよかったとおもいました。`;
    else if (readImpressionLabel.includes('すっきり')) block1 += `よみおわったときに、すっきりとしたきもちになりました。`;
    else block1 += `この本がどんなお話かとても気になっていました。`;
  } else if (high) {
    if (readImpressionLabel.includes('一気') || readImpressionLabel.includes('はまって')) block1 += `読み始めると止まらなくなり、一気に読み進めてしまいました。`;
    else if (readImpressionLabel.includes('じっくり') || readImpressionLabel.includes('ゆっくり')) block1 += `じっくりと内容を味わいながら読み進めることができました。`;
    else if (readImpressionLabel.includes('難し') || readImpressionLabel.includes('読みごたえ')) block1 += `難しい内容もありましたが、読みごたえのある作品でした。`;
    else if (readImpressionLabel.includes('期待以上') || readImpressionLabel.includes('もっとよかった')) block1 += `実際に読み始めると、期待をはるかに上回る内容でした。`;
    else if (readImpressionLabel.includes('充実') || readImpressionLabel.includes('達成') || readImpressionLabel.includes('すっきり')) block1 += `読み終えたとき、大きな充実感と達成感を感じました。`;
    else block1 += `読む前から、この本に対して強い期待と興味を持っていました。`;
  } else {
    if (readImpressionLabel.includes('はまって')) block1 += `読み始めたら止まらなくなり、どんどん読み進めてしまいました。`;
    else if (readImpressionLabel.includes('ゆっくり')) block1 += `ゆっくり楽しみながら読み進めることができました。`;
    else if (readImpressionLabel.includes('難しい') || readImpressionLabel.includes('難し')) block1 += `難しいところもありましたが、最後まで読み切ることができました。`;
    else if (readImpressionLabel.includes('期待') || readImpressionLabel.includes('もっとよかった')) block1 += `読み始めると期待以上におもしろくて、よかったと思いました。`;
    else if (readImpressionLabel.includes('すっきり')) block1 += `読み終えたとき、すっきりとした気持ちになりました。`;
    else block1 += `読む前は、どんなお話かワクワクしながら期待していました。`;
  }

  // ジャンル・主人公・結末・主人公の挑戦 → block2
  const genreLabel = (answers.genre && answers.genre.label) || '';
  const charLabel = (answers.mainChar && answers.mainChar.label) || '';
  const endLabel = (answers.ending && answers.ending.label) || '';
  const charChallengeLabel = (answers.charChallenge && answers.charChallenge.label) || '';
  // charChallengeラベルを文中に使える形に変換
  function normalizeChallenge(label) {
    if (!label) return low ? 'いろいろなことにぶつかりながらもがんばっていました' : 'さまざまな困難に立ち向かいながら頑張っていました';
    if (label.includes('けんか') || label.includes('仲直り') || label.includes('葛藤')) return low ? 'ともだちとのけんかやなかなおりにがんばっていました' : '人間関係の悩みや仲直りに一生懸命取り組んでいました';
    if (label.includes('目標') || label.includes('もくひょう') || label.includes('挑戦') || label.includes('ちょうせん')) return low ? 'むずかしいもくひょうにむかってちょうせんしつづけていました' : '高い目標に向かって挑戦し続けていました';
    if (label.includes('悲し') || label.includes('かなし') || label.includes('喪失') || label.includes('のりこえ')) return low ? 'かなしいできごとをのりこえようとがんばっていました' : '悲しい出来事を乗り越えようと前向きに頑張っていました';
    if (label.includes('こわい') || label.includes('恐') || label.includes('困難') || label.includes('こんなん')) return low ? 'こわいものやこんなんにゆうきをもって立ち向かっていました' : '恐怖や困難にも勇気をもって立ち向かっていました';
    if (label.includes('気持ち') || label.includes('きもち') || label.includes('伝え') || label.includes('つたえ') || label.includes('表現')) return low ? 'じぶんのきもちをつたえようとがんばっていました' : '自分の気持ちや思いを伝えることに一生懸命でした';
    return low ? 'いろいろなことにぶつかりながらもがんばっていました' : 'さまざまな困難に立ち向かいながら頑張っていました';
  }
  let block2 = '';
  if (low) {
    block2 = `このお話は${genreLabel}です。主人公は${charLabel}で、${normalizeEnding(endLabel)}。お話の中で、しゅじんこうは${normalizeChallenge(charChallengeLabel)}。そのすがたがとてもこころに残りました。`;
  } else if (high) {
    block2 = `この物語は${genreLabel}で、主人公は${charLabel}です。${normalizeEnding(endLabel)}。物語全体を通して、主人公は${normalizeChallenge(charChallengeLabel)}。その姿が丁寧に描かれており、読み応えのある作品でした。`;
  } else {
    block2 = `この物語は${genreLabel}で、主人公は${charLabel}です。${normalizeEnding(endLabel)}。物語の中で主人公は${normalizeChallenge(charChallengeLabel)}。その姿がとても印象的でした。`;
  }

  // 心に残った場面・気持ち・似た経験 → block3
  const sceneWhenLabel = (answers.sceneWhen && answers.sceneWhen.label) || '';
  const sceneFeelLabel = (answers.sceneFeel && answers.sceneFeel.label) || '';
  const sceneReasonLabel = (answers.sceneReason && answers.sceneReason.label) || '';
  const similarLabel = (answers.similarExp && answers.similarExp.label) || '';
  const similarText = (answers.similarExp && answers.similarExp.text) || '';
  const allScene = sceneWhenLabel.includes('ぜんぶ') || sceneWhenLabel.includes('全体');
  // sceneReasonラベルを「なぜなら〜から」の形に変換
  function normalizeSceneReason(label) {
    if (!label) return low ? 'しゅじんこうのきもちがよくつたわってきたから' : '主人公の気持ちがとても伝わってきたから';
    if (label.includes('かわいそう') || label.includes('苦しさ')) return low ? 'しゅじんこうがかわいそうで、きもちがつたわってきたから' : '主人公の苦しさや辛さが伝わってきたから';
    if (label.includes('かっこよかった') || label.includes('行動がかっこ')) return low ? 'しゅじんこうのこうどうがかっこよくて、すごいとおもったから' : '主人公の行動がかっこよく、憧れを感じたから';
    if (label.includes('自分と似て') || label.includes('じぶんとにて') || label.includes('経験と重な')) return low ? 'じぶんとにたようなけいけんがあって、きもちがよくわかったから' : '自分の経験と重なる部分があり、気持ちがよく分かったから';
    if (label.includes('予想') || label.includes('よそう')) return low ? 'よそうとちがうことがおきて、びっくりしたから' : '予想と違う展開があり、強く印象に残ったから';
    if (label.includes('気持ちがよく') || label.includes('きもちがよく') || label.includes('感情がリアル')) return low ? 'しゅじんこうのきもちがよくわかって、いっしょにかんじることができたから' : '主人公の感情がリアルに伝わり、一緒に感じることができたから';
    return low ? 'しゅじんこうのきもちがよくつたわってきたから' : '主人公の気持ちがとても伝わってきたから';
  }
  let block3 = '';
  if (low) {
    block3 = allScene
      ? `このお話はどのばめんもこころにのこりました。よんでいて、${normalizeFeeling(sceneFeelLabel)}なりました。`
      : `いちばんこころにのこったのは、${sceneWhenLabel}のばめんです。そのばめんでは、${normalizeFeeling(sceneFeelLabel)}なりました。`;
    block3 += `なぜそんなきもちになったかというと、${normalizeSceneReason(sceneReasonLabel)}です。`;
    if (similarText) block3 += `じぶんにも「${similarText}」というけいけんがあって、しゅじんこうのきもちがよくわかりました。`;
    else if (!similarLabel.includes('ない')) block3 += `じぶんにも似たようなけいけんがあったので、しゅじんこうのきもちがさらによくわかりました。`;
  } else if (high) {
    block3 = allScene
      ? `この物語は全体を通して印象に残り、読んでいて${normalizeFeeling(sceneFeelLabel)}なりました。`
      : `最も印象に残ったのは${sceneWhenLabel}の場面で、${normalizeFeeling(sceneFeelLabel)}なりました。`;
    block3 += `なぜそのような感情を抱いたかというと、${normalizeSceneReason(sceneReasonLabel)}からです。`;
    if (similarText) block3 += `自分自身も「${similarText}」という経験があり、主人公の気持ちがとてもよく分かりました。`;
    else if (!similarLabel.includes('ない')) block3 += `自分にも似た経験があり、主人公の気持ちが深く伝わってきました。`;
  } else {
    block3 = allScene
      ? `この物語は全体的に心に残り、読んでいて${normalizeFeeling(sceneFeelLabel)}なりました。`
      : `最も心に残ったのは、${sceneWhenLabel}の場面です。その場面では、${normalizeFeeling(sceneFeelLabel)}なりました。`;
    block3 += `なぜそのような気持ちになったかというと、${normalizeSceneReason(sceneReasonLabel)}からです。`;
    if (similarText) block3 += `自分にも「${similarText}」という経験があり、主人公の気持ちがよく分かりました。`;
    else if (!similarLabel.includes('ない')) block3 += `自分にも似た経験があって、主人公の気持ちがより一層伝わってきました。`;
  }

  // これから・すすめたい人・主人公の印象的な行動 → block4
  const futureLabel = (answers.future && answers.future.label) || '';
  const recommendLabel = (answers.recommend && answers.recommend.label) || '';
  const charActionLabel = (answers.charAction && answers.charAction.label) || '';
  const futureText = normalizeFuture(futureLabel);
  // charActionラベルを「主人公が〜のを見て」の形に変換
  function normalizeCharAction(label) {
    if (!label) return low ? 'しゅじんこうをみていて' : '主人公の姿を読んで';
    if (label.includes('あきらめず') || label.includes('諦めず') || label.includes('挑戦し続け')) return low ? 'しゅじんこうがあきらめずにつづけるすがたをみて' : '主人公が諦めずに挑戦し続ける姿を読んで';
    if (label.includes('誰かのため') || label.includes('だれかのため') || label.includes('犠牲')) return low ? 'しゅじんこうがだれかのためにうごくすがたをみて' : '主人公が誰かのために行動する姿を読んで';
    if (label.includes('気持ちを伝え') || label.includes('きもちをつたえ') || label.includes('正直に')) return low ? 'しゅじんこうがじぶんのきもちをつたえようとするすがたをみて' : '主人公が正直に自分の気持ちを伝えようとする姿を読んで';
    if (label.includes('勇気') || label.includes('ゆうき') || label.includes('恐れを乗り越え')) return low ? 'しゅじんこうがゆうきをだしてこうどうするすがたをみて' : '主人公が勇気をもって行動する姿を読んで';
    if (label.includes('間違い') || label.includes('まちがい') || label.includes('謝') || label.includes('あやまっ') || label.includes('反省')) return low ? 'しゅじんこうがまちがいをみとめてあやまるすがたをみて' : '主人公が非を認めて謝る姿を読んで';
    return low ? 'しゅじんこうをみていて' : '主人公の姿を読んで';
  }
  let block4 = '';
  if (low) {
    block4 = `この本をよんで、${futureText}。なぜなら、${normalizeCharAction(charActionLabel)}、じぶんもそうしたいとつよくおもったからです。この本をよんでよかったとおもいます。`;
    if (recommendLabel && !recommendLabel.includes('すすめない')) {
      const who = recommendLabel.replace('にすすめたい', '');
      block4 += `${who}にも、ぜひよんでほしいとおもいます。きっとたのしんでよめるとおもいます。`;
    }
  } else if (high) {
    block4 = `この本を読んで、${futureText}。なぜなら、${normalizeCharAction(charActionLabel)}、自分の行動や考え方を見直すきっかけをもらったからです。この本を読んで、本当によかったと感じています。`;
    if (recommendLabel && !recommendLabel.includes('すすめない')) {
      const who = recommendLabel.replace('にすすめたい', '');
      block4 += `ぜひ${who}にも読んでほしいと思います。きっと多くのことを感じ取れる作品だと思います。`;
    }
  } else {
    block4 = `この本を読んで、${futureText}。なぜなら、${normalizeCharAction(charActionLabel)}、自分もそうしたいと強く思ったからです。この本を読んで本当によかったと思います。`;
    if (recommendLabel && !recommendLabel.includes('すすめない')) {
      const who = recommendLabel.replace('にすすめたい', '');
      block4 += `ぜひ${who}にも読んでもらいたいと思います。きっと何か大切なことが伝わると思います。`;
    }
  }

  return { block1, block2, block3, block4 };
}

/* ===== API KEY ===== */
const API_KEY_STORE = 'hokuri_api_key';
function getApiKey() { return localStorage.getItem(API_KEY_STORE) || ''; }
function saveApiKey(key) { localStorage.setItem(API_KEY_STORE, key); }
function renderApiKeySection() {
  const key = getApiKey();
  const hasKey = key.length > 0;
  const demo = isDemoMode();
  const cat = gradeCat();
  const label = cat === 'low' ? '🔑 APIキーをせっていする' : '🔑 APIキーを設定する';
  const statusText = hasKey ? '✅ APIキーが設定されています' : (cat==='low' ? '⚠️ APIキーがせっていされていません' : '⚠️ APIキーが設定されていません');
  return `<div class="api-key-section">
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
      <div class="api-key-toggle" onclick="var b=document.getElementById('apiKeyBody');b.style.display=b.style.display==='none'?'flex':'none'">
        ${label} ${hasKey ? '✅ ▾' : '⚠️ ▾'}
      </div>
      <button onclick="toggleDemoMode()" style="font-size:0.75rem;padding:4px 10px;border-radius:20px;border:2px solid ${demo?'#ff8c42':'#ccc'};background:${demo?'#fff3e6':'#f5f5f5'};color:${demo?'#ff8c42':'#888'};cursor:pointer;font-weight:700;">${demo?'🧪 デモON':'🧪 デモOFF'}</button>
    </div>
    <div class="api-key-body" id="apiKeyBody" style="display:${hasKey?'none':'flex'}">
      <input type="password" id="apiKeyInput" placeholder="sk-ant-api03-..." value="">
      <button class="api-key-save-btn" onclick="saveApiKeyFromInput()">${cat==='low'?'ほぞん':'保存'}</button>
    </div>
    <div class="api-key-status ${hasKey?'':'not-set'}">${demo ? '🧪 デモモード（サンプル結果が表示されます）' : statusText}</div>

}
function saveApiKeyFromInput() {
  const inp = document.getElementById('apiKeyInput');
  if (!inp || !inp.value.trim()) return;
  saveApiKey(inp.value.trim());
  renderStep();
}

/* ===== GRADE / VOICE STATE ===== */
let currentStep = 0;
let answers = {};
let grade = '3年生';
let isSpeaking = false;
let speakSessionId = 0;
let bestJaVoice = null;
let resultData = null; // 結果データをグローバルで保持（音声読み上げ用）

function initVoice() {
  if (!window.speechSynthesis) return;
  function pickVoice() {
    const voices = window.speechSynthesis.getVoices();
    const ja = voices.filter(v => v.lang === 'ja-JP' || v.lang === 'ja');
    // 優先順位: Enhanced/Premium/Neural → ローカル高品質 → ローカル → デフォルト
    bestJaVoice =
      ja.find(v => /enhanced|premium|neural/i.test(v.name)) ||
      ja.find(v => v.localService && !/compact/i.test(v.name)) ||
      ja.find(v => v.localService) ||
      ja[0] || null;
  }
  pickVoice();
  window.speechSynthesis.onvoiceschanged = pickVoice;
}

// 発話にボイス・速度・ピッチを適用する共通関数
function applyVoice(u) {
  u.lang = 'ja-JP';
  u.rate = 0.92;   // 自然な速さ（デフォルト1.0より少し遅め）
  u.pitch = 1.0;   // 自然なピッチ
  u.volume = 1;
  if (bestJaVoice) u.voice = bestJaVoice;
}

function gradeCat() {
  const g = parseInt(grade);
  if (g <= 2) return 'low';
  if (g <= 4) return 'mid';
  return 'high';
}
function t(obj) {
  if (!obj || typeof obj === 'string') return obj || '';
  return obj[gradeCat()] || obj.mid || '';
}

/* ===== VOICE ===== */
function speak(text) {
  if (!window.speechSynthesis) return;
  stopSpeak();
  const sid = ++speakSessionId;
  const u = new SpeechSynthesisUtterance(text);
  applyVoice(u);
  u.onstart = () => {
    if (speakSessionId !== sid) return;
    isSpeaking = true;
    document.querySelectorAll('.bubble-voice, .q-voice, .field-voice, .title-voice').forEach(b => {
      if (b.dataset.speak === text) b.classList.add('speaking');
    });
  };
  u.onend = u.onerror = () => {
    isSpeaking = false;
    document.querySelectorAll('.speaking').forEach(b => b.classList.remove('speaking'));
  };
  window.speechSynthesis.speak(u);
}
function stopSpeak() {
  speakSessionId++;
  if (window.speechSynthesis) { window.speechSynthesis.cancel(); isSpeaking = false; }
  document.querySelectorAll('.speaking, .voice-highlight').forEach(b => b.classList.remove('speaking', 'voice-highlight'));
}
function toggleSpeak(text, el) {
  if (el.classList.contains('speaking')) { stopSpeak(); } else { speak(text); }
}

// 質問＋選択肢を順番に読み上げ、読んでいる選択肢をハイライト
function speakWithOptions(qId, voiceText, optLabels) {
  if (!window.speechSynthesis) return;
  stopSpeak();
  const sid = ++speakSessionId;
  const texts = [voiceText, ...optLabels];
  let i = 0;

  function clearHighlights() {
    const c = document.getElementById('opts_' + qId);
    if (c) c.querySelectorAll('.opt').forEach(el => el.classList.remove('voice-highlight'));
  }

  function next() {
    if (speakSessionId !== sid) { clearHighlights(); return; }
    if (i >= texts.length) { clearHighlights(); isSpeaking = false; return; }
    clearHighlights();
    if (i > 0) {
      const c = document.getElementById('opts_' + qId);
      if (c) {
        const opts = c.querySelectorAll('.opt');
        if (opts[i - 1]) opts[i - 1].classList.add('voice-highlight');
      }
    }
    const u = new SpeechSynthesisUtterance(texts[i]);
    applyVoice(u);
    isSpeaking = true;
    u.onend = () => { i++; next(); };
    u.onerror = () => { clearHighlights(); isSpeaking = false; };
    window.speechSynthesis.speak(u);
  }
  next();
}

const STEP_EMOJIS = ['📖','📚','💬','🌱','🤔','🎉'];

/* ===== PROGRESS ===== */
function updateProgress() {
  const pct = (currentStep / STEPS.length) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
  const row = document.getElementById('stepsRow');
  row.innerHTML = '';
  STEP_EMOJIS.forEach((e, i) => {
    const d = document.createElement('div');
    d.className = 'step-dot' + (i === currentStep ? ' active' : i < currentStep ? ' done' : '');
    d.textContent = i < currentStep ? '✓' : e;
    row.appendChild(d);
  });
  // ヘッダー画像をステップに合わせて切り替え
  const headerImg = document.getElementById('headerOwl');
  if (headerImg) {
    const type = currentStep >= STEPS.length ? 'end' : currentStep >= 2 ? 'mid' : 'start';
    headerImg.src = { start:'images/IMG_7110.png', mid:'images/IMG_7111.png', end:'images/IMG_7112.png' }[type];
  }
}

/* ===== RENDER STEP ===== */
function renderStep() {
  updateProgress();
  if (currentStep >= STEPS.length) { renderLoading(); generateResult(); return; }
  const step = STEPS[currentStep];
  if (step.type === 'info') renderInfoStep(step);
  else renderChoiceStep(step);
}

function selectOpt(qId, idx, label, showInput) {
  const cur = answers[qId] || {};
  answers[qId] = { label, text: cur.label === label ? cur.text : '', showInput: !!showInput };
  // update UI
  const container = document.getElementById('opts_' + qId);
  if (!container) return;
  container.querySelectorAll('.opt').forEach((el, i) => {
    el.classList.toggle('selected', i === idx);
  });
  const otherInput = document.getElementById('otherinput_' + qId);
  if (otherInput) {
    otherInput.classList.toggle('show', !!showInput);
    if (showInput) { otherInput.focus(); }
  }
  validateChoices();
}

function validateChoices() {
  const step = STEPS[currentStep];
  const btn = document.getElementById('nextBtn');
  if (!btn || !step.questions) return;
  const valid = step.questions.every(q => {
    const ans = answers[q.id];
    if (!ans || !ans.label) return false;
    if (ans.showInput && (!ans.text || ans.text.trim() === '') && ans.label !== 'ない' && ans.label !== 'あんまりすすめない' && ans.label !== 'あまりすすめない') {
      // text input required only for true "その他" (not showInput from options like "ある")
      if (ans.label === 'その他') return false;
    }
    return true;
  });
  btn.disabled = !valid;
}

/* ===== NAVIGATION ===== */
function updateTargetCharDefault() {
  const sel = document.getElementById('field_targetChars');
  if (!sel) return;
  const g = parseInt(grade);
  sel.value = g <= 2 ? '800' : g <= 6 ? '1200' : '2000';
  answers.targetChars = parseInt(sel.value);

function saveInfoAnswers() {
  const titleEl = document.getElementById('field_title');
  const gradeEl = document.getElementById('field_grade');
  const targetEl = document.getElementById('field_targetChars');
  if (titleEl) { answers.title = titleEl.value; }
  if (gradeEl) { answers.grade = gradeEl.value; grade = gradeEl.value; }
  if (targetEl) { answers.targetChars = parseInt(targetEl.value); }
}

function nextStep() {
  stopSpeak();
  if (currentStep === 0) saveInfoAnswers();
  currentStep++;
  renderStep();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function prevStep() {
  stopSpeak();
  currentStep--;
  renderStep();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

以下の条件で書いてください：

// 結果ブロックを1つ読む（keyで指定）
function speakBlock(key) {
  if (!resultData) return;
  speakBlocks([resultData[key] || '']);
}
// 結果ブロックを全部読む
function speakAllBlocks() {
  if (!resultData) return;
  speakBlocks(['block1','block2','block3','block4'].map(k => resultData[k] || ''));
}

// 複数テキストを順番に読み上げ（結果ブロック用）
function speakBlocks(texts) {
  if (!window.speechSynthesis) return;
  stopSpeak();
  const sid = ++speakSessionId;
  let i = 0;
  function next() {
    if (speakSessionId !== sid) return;
    if (i >= texts.length) { isSpeaking = false; return; }
    const u = new SpeechSynthesisUtterance(texts[i]);
    applyVoice(u);
    isSpeaking = true;
    u.onend = () => { i++; next(); };
    u.onerror = () => { isSpeaking = false; };
    window.speechSynthesis.speak(u);
  }
  next();
}

    </div>
    <button class="btn-copy" onclick="copyAll()">📋 ${cat==='low'?'ぜんぶコピーする':'全部コピーする'}</button>
    <button class="btn-restart" onclick="restart()">🔄 ${cat==='low'?'もう一さつやってみる':'もう一冊やってみる'}</button>`;
  speak(doneMsg);
}

function copyAll() {
  const els = document.querySelectorAll('.section-content');
  const text = Array.from(els).map(e => e.textContent).join('\n\n');
  navigator.clipboard.writeText(text).then(() => {
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  });
}

function restart() {
  stopSpeak();
  currentStep = 0;
  answers = {};
  grade = '3年生';
  renderStep();
  window.scrollTo({top:0,behavior:'smooth'});
}

// どこかを触ると音声が止まる（音声ボタン自体はtoggleSpeakで管理）
document.addEventListener('touchstart', (e) => {
  if (!isSpeaking) return;
  const voiceBtn = e.target.closest('.bubble-voice, .q-voice, .field-voice, .title-voice');
  if (!voiceBtn) stopSpeak();
}, { passive: true });
document.addEventListener('mousedown', (e) => {
  if (!isSpeaking) return;
  const voiceBtn = e.target.closest('.bubble-voice, .q-voice, .field-voice, .title-voice');
  if (!voiceBtn) stopSpeak();
});

// Init
initVoice();
renderStep();
</script>
</body>
</html>
